services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skinbox
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skinbox}
      POSTGRES_DB: skinbox
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinbox"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/skinbox
      SPRING_DATASOURCE_USERNAME: skinbox
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-skinbox}
      ADMIN_BOOTSTRAP_STEAM_IDS: ${ADMIN_BOOTSTRAP_STEAM_IDS:-76561197960287930}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://skinbox.market}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_dummy}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://skinbox.market/?deposit=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://skinbox.market/?deposit=cancel}
      STEAM_REALM: ${STEAM_REALM:-https://skinbox.market/}
      STEAM_RETURN_URL: ${STEAM_RETURN_URL:-https://skinbox.market/api/auth/steam/return}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-onboarding@resend.dev}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://skinbox.market}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      SECURITY_HSTS: ${SECURITY_HSTS:-true}
      SECURITY_CSRF: ${SECURITY_CSRF:-true}
      TRADE_AUTO_RELEASE_DAYS: ${TRADE_AUTO_RELEASE_DAYS:-8}
    restart: unless-stopped

volumes:
  pgdata:
