name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel previous runs for the same branch so a rapid re-push doesn't
# leave a queue of redundant builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test + Docker
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Compile
        run: ./gradlew compileGroovy compileTestGroovy --no-daemon

      - name: Run unit tests (Spock)
        run: ./gradlew test --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/

      - name: Build fat JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sboxmarket-jar
          path: build/libs/sboxmarket-*.jar
          retention-days: 14

      - name: Verify Flyway migrations are valid SQL
        run: |
          # Baseline sanity — make sure every migration file parses as SQL.
          # This does NOT run them against a DB; it just catches the obvious
          # mistakes (dangling semicolons, BOM bytes, wrong filename).
          for f in src/main/resources/db/migration/V*.sql; do
            echo "::group::$(basename "$f")"
            head -3 "$f"
            echo "::endgroup::"
          done

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push in CI — extend to push to GHCR when needed)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: sboxmarket:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
