# Reference Nginx configuration for a single-host SkinBox deployment.
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/skinbox.market
#   sudo ln -s /etc/nginx/sites-available/skinbox.market /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d skinbox.market
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name skinbox.market;
    # Let certbot / webroot serve the ACME challenge, redirect everything else
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name skinbox.market;

    ssl_certificate     /etc/letsencrypt/live/skinbox.market/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skinbox.market/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # gzip + brotli if the module is present
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static asset caching — JS/CSS are hashed by Spring's static resource
    # chain when bundled, so a 1-year cache is safe. For now we use a short
    # conservative window until a bundler is wired up.
    location ~* \.(js|css|woff2|svg|png|ico)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control     "public, max-age=300";
    }

    # Stripe webhook — proxy straight through. The filter chain on the
    # backend verifies the webhook signature; Nginx just shuttles bytes.
    location /api/stripe/webhook {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # Health probe — never cached, never logged at access level. Docker /
    # systemd / load balancer probes hit this every few seconds and would
    # otherwise flood the access log.
    location = /api/health {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        add_header         Cache-Control     "no-store" always;
        access_log         off;
    }

    # Everything else — API + SPA + Steam callback. Upstream timeout is set
    # tighter than Spring's default to catch wedged backends. Body cap
    # matches the BodySizeLimitFilter cap on the JVM side (2MB) so Nginx
    # rejects oversize requests at the edge before they reach the filter
    # chain, with `413 Request Entity Too Large` instead of eating filter
    # CPU. The backend filter stays as a second line of defence in case
    # the Nginx config drifts.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        client_max_body_size 2m;
    }

    # Security headers — belt-and-braces on top of the CorrelationIdFilter.
    # The backend already emits these on every response, but asserting them
    # at the edge means they survive even if the JVM is misconfigured.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
