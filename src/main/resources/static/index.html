<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkinBox — s&box Skin Marketplace</title>
  <meta name="description" content="The s&box skin marketplace — trade Workshop items, hats, and clothing with full price history and trusted sellers.">
  <meta name="theme-color" content="#070b18">
  <!-- Full favicon set. Browsers pick the closest matching size for the
       tab icon slot (16/32 on standard DPI, 48+ on HiDPI). Giving them
       actual square sources means the crate renders edge-to-edge in the
       tab slot instead of being letterboxed inside the rectangular
       1536×1024 source. favicon.ico is the legacy fallback for older
       Edge/IE and bookmark tiles. -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16"  href="/img/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32"  href="/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48"  href="/img/favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96"  href="/img/favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/img/favicon-192.png">
  <meta property="og:title" content="SkinBox — s&box Skin Marketplace">
  <meta property="og:description" content="Trade Workshop items and cosmetics with lower fees than Steam. Escrowed trades, Stripe payouts.">
  <meta property="og:image" content="https://skinbox.market/img/favicon-512.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://skinbox.market">
  <meta property="og:site_name" content="SkinBox">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SkinBox — s&box Skin Marketplace">
  <meta name="twitter:description" content="Trade Workshop items and cosmetics with lower fees than Steam. Escrowed trades, Stripe payouts.">
  <meta name="twitter:image" content="https://skinbox.market/img/favicon-512.png">
  <meta name="color-scheme" content="dark">
  <meta name="format-detection" content="telephone=no">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://unpkg.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <!-- Material Symbols Rounded — single font file powers every icon in the nav / menus / buttons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="root"></div>
  <noscript>
    <div style="max-width:560px;margin:80px auto;padding:28px 32px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#e2e7f5;background:#0d1320;border:1px solid #1e2840;border-radius:10px;text-align:center;">
      <h1 style="margin:0 0 10px;font-size:20px;color:#1ea5ff;">JavaScript required</h1>
      <p style="margin:0;color:#8a93b5;line-height:1.55;">SkinBox is a single-page application. Please enable JavaScript to browse listings, place orders, and manage your stall.</p>
    </div>
  </noscript>

  <!--
    React + React-DOM pinned to 18.2.0 with Subresource Integrity hashes.
    If unpkg is ever compromised to serve altered JS, the browser will
    refuse to run it because the sha384 won't match. To roll either
    library forward, fetch the new file and compute:
      curl -sS <url> | openssl dgst -sha384 -binary | openssl base64 -A
  -->
  <script crossorigin="anonymous"
          integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8"
          src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin="anonymous"
          integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh"
          src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
